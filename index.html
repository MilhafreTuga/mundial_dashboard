<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Milhafretuga Live Broadcast Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* PALETE DE CORES OFICIAL MUNDIAL 2026 */
        :root {
            --wc-dark-void: #060814;
            --wc-panel-glass: rgba(10, 14, 28, 0.82);
            --wc-magenta: #ff0055;
            --wc-cyan: #00f0ff;
            --wc-neon-green: #00ff66;
            --wc-gold: #ffcc00;
            --glow-cyan: rgba(0, 240, 255, 0.35);
            --glow-magenta: rgba(255, 0, 85, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* BANNER DE TRANSMISSÃO ASSIMÉTRICO (ESTILO FIFA TV) */
        .wc-header-node {
            width: 1920px;
            height: 110px;
            background: linear-gradient(135deg, #02040a 0%, #0c1020 40%, #05070e 100%);
            border-bottom: 5px solid #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .wc-header-node::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 45%;
            height: 5px;
            background: linear-gradient(90deg, transparent, var(--wc-cyan));
            box-shadow: 0 0 20px var(--wc-cyan);
            z-index: 2;
        }

        .wc-header-node::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 0;
            width: 45%;
            height: 5px;
            background: linear-gradient(90deg, var(--wc-magenta), transparent);
            box-shadow: 0 0 20px var(--wc-magenta);
            z-index: 2;
        }

        .logo-emblem-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 24px 8px 15px;
            border-radius: 0 30px 30px 0;
            border-left: 4px solid var(--wc-cyan);
            clip-path: polygon(0 0, 92% 0, 100% 100%, 0% 100%);
        }

        .logo-container-box {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stream-logo {
            max-height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 12px var(--glow-cyan));
        }

        .brand-text-ticker {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .title-core {
            text-align: center;
            position: relative;
        }

        .title-core h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #ffffff 0%, #cbd5e1 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-core p {
            margin: 3px 0 0 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--wc-gold);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .live-ticker-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
            background: var(--wc-magenta);
            padding: 8px 22px;
            border-radius: 4px;
            letter-spacing: 3px;
            box-shadow: 0 0 20px var(--glow-magenta);
            clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
            animation: broadcast-pulse 2s infinite alternate;
        }

        /* ESPAÇO GEOMÉTRICO DO ESTÚDIO */
        .studio-grid {
            display: grid;
            grid-template-columns: 460px 900px 500px;
            gap: 25px;
            padding: 30px;
            height: calc(1080px - 110px);
            box-sizing: border-box;
        }

        .pro-panel {
            background: var(--wc-panel-glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 25px 55px rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .pro-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border-top: 4px solid var(--wc-cyan);
            border-left: 4px solid var(--wc-cyan);
            border-radius: 4px 0 0 0;
            pointer-events: none;
        }

        .pro-panel::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            border-bottom: 4px solid var(--wc-magenta);
            border-right: 4px solid var(--wc-magenta);
            border-radius: 0 0 4px 0;
            pointer-events: none;
        }

        .panel-tag-header {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px 24px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #f1f5f9;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-tag-header span {
            font-family: 'Orbitron', sans-serif;
            color: var(--wc-cyan);
            font-size: 11px;
        }

        .viewport-frame {
            width: 100%;
            height: 100%;
            background: #090b11;
        }

        .right-stack-cluster {
            display: flex;
            flex-direction: column;
            gap: 25px;
            height: 100%;
        }

        .stats-deck {
            flex: 1;
        }

        .hud-webcam-mount {
            width: 500px;
            height: 281px;
            background: rgba(4, 6, 14, 0.5);
            border-radius: 16px;
            border: 2px solid rgba(0, 240, 255, 0.25);
            box-shadow: inset 0 0 20px rgba(0,240,255,0.08), 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .hud-webcam-mount::before {
            content: '▲';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: var(--wc-cyan);
            opacity: 0.5;
        }

        .corner-bracket {
            position: absolute;
            width: 15px;
            height: 15px;
            pointer-events: none;
        }
        .cb-tl { top: 12px; left: 12px; border-top: 3px solid var(--wc-magenta); border-left: 3px solid var(--wc-magenta); }
        .cb-tr { top: 12px; right: 12px; border-top: 3px solid var(--wc-magenta); border-right: 3px solid var(--wc-magenta); }

        .webcam-hud-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
        }

        @keyframes broadcast-pulse {
            0% { background-color: #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }
            100% { background-color: #b3003b; box-shadow: 0 0 5px rgba(255, 0, 85, 0.1); }
        }
    </style>
</head>
<body>

    <audio id="stadium-core-audio" loop autoplay>
        <source src="estadio.mp3" type="audio/mpeg">
    </audio>

    <div class="wc-header-node">
        <div class="logo-emblem-wrapper">
            <div class="logo-container-box">
                <img class="stream-logo" src="logo.png" alt="Stream Logo">
            </div>
            <div class="brand-text-ticker">LIVE</div>
        </div>
        
        <div class="match-info-center">
            <div class="title-core">
                <h1>PORTUGAL x UZBEQUISTÃO</h1>
                <p>FIFA WORLD CUP 2026 • MATCH CENTER</p>
            </div>
        </div>

        <div class="live-ticker-badge">ON AIR</div>
    </div>

    <div class="studio-grid">
        
        <!-- PAINEL ALFA: REFEITO COM ID E SLUG -->
        <div class="pro-panel">
            <div class="panel-tag-header">
                MURAL DE INCIDENTES <span>[LIVE TIMELINE]</span>
            </div>
            <div class="viewport-frame">
                <div class="sofascore-embed" id="sofascore-embed-match-details-overview" data-id="15186858" data-slug="uzbekistan-portugal" data-widget-theme="dark" data-widget-type="match-details" data-widget-tab="overview"></div>
            </div>
        </div>

        <!-- PAINEL BETA: REFEITO COM ID E SLUG -->
        <div class="pro-panel">
            <div class="panel-tag-header">
                DISPOSIÇÃO TÁTICA & PERFORMANCE <span>[TACTICAL GRAPH]</span>
            </div>
            <div class="viewport-frame">
                <div class="sofascore-embed" id="sofascore-embed-match-details-lineups" data-id="15186858" data-slug="uzbekistan-portugal" data-widget-theme="dark" data-widget-type="match-details" data-widget-tab="lineups"></div>
            </div>
        </div>

        <!-- PAINEL GAMA: REFEITO COM ID E SLUG -->
        <div class="right-stack-cluster">
            
            <div class="pro-panel stats-deck">
                <div class="panel-tag-header">
                    DADOS CORE DA PARTIDA <span>[LIVE DATA]</span>
                </div>
                <div class="viewport-frame">
                    <div class="sofascore-embed" id="sofascore-embed-match-details-statistics" data-id="15186858" data-slug="uzbekistan-portugal" data-widget-theme="dark" data-widget-type="match-details" data-widget-tab="statistics"></div>
                </div>
            </div>
            
            <div class="hud-webcam-mount">
                <div class="corner-bracket cb-tl"></div>
                <div class="corner-bracket cb-tr"></div>
                <div class="webcam-hud-text">FEED DA WEBCAM</div>
            </div>
            
        </div>

    </div>

    <script>
        (function () {
            var id = 'sofascore-embed-script';
            if (document.getElementById(id)) return;
            var script = document.createElement('script');
            script.id = id;
            script.type = 'text/javascript';
            script.src = 'https://widgets.sofascore.com/embed.js';
            document.body.appendChild(script);
        })();

        window.onload = function() {
            var audio = document.getElementById("stadium-core-audio");
            if (audio) {
                audio.volume = 0.12;
                audio.play().catch(function(err) { console.log("Áudio em standby."); });
            }
        };
    </script>
</body>
</html>
