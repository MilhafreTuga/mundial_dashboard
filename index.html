<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: transparent; overflow: hidden; }
        .widget-wrapper { width: 100%; height: 800px; }
        .sofascore-embed { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="widget-wrapper">
        <div class="sofascore-embed" data-id="15186858" data-widget-theme="dark" data-widget-type="match-details" data-widget-tab="overview"></div>
    </div>

    <script>
        function loadSofascore() {
            var script = document.createElement('script');
            script.src = "https://widgets.sofascore.com/embed.js";
            script.async = true;
            document.body.appendChild(script);
        }

        // Aguarda 1 segundo após o carregamento da página para evitar conflitos de Render
        window.addEventListener('load', function() {
            setTimeout(loadSofascore, 1000);
        });
    </script>
</body>
</html>
